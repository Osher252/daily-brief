name: Voice Sampler

on:
  workflow_dispatch:
    inputs:
      voices:
        description: "Comma-separated OpenAI voices to sample"
        default: "nova,coral,shimmer,ash,onyx"
        required: false

permissions:
  contents: write

jobs:
  sample:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate voice samples
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          VOICES: ${{ inputs.voices }}
        run: python voice_sampler.py
      - name: Commit samples
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --staged --quiet; then
            echo "No new samples."
          else
            git commit -m "Voice samples"
            git push
          fi
