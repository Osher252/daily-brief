name: Daily Brief

on:
  schedule:
    # Weekdays only (Mon-Fri). GitHub's timer runs in UTC. London is UTC+1 in
    # summer (BST) and UTC+0 in winter (GMT), so we fire at BOTH 06:00 and 07:00
    # UTC. The "gate" job below then lets the real work run only when it is
    # actually 07:00 in London — giving us one brief each weekday at 7am London,
    # all year round. (06:00/07:00 UTC on Mon-Fri stays Mon-Fri in London.)
    - cron: "0 6,7 * * 1-5"
  workflow_dispatch: {}   # also lets you run it on demand from the Actions tab

permissions:
  contents: write          # needed to commit the finished brief back to the repo

concurrency:
  group: daily-brief
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$(TZ=Europe/London date +%H)" = "07" ]; then
            echo "It is 7am in London (or a manual run). Proceeding."
            echo "run=yes" >> "$GITHUB_OUTPUT"
          else
            echo "Not 7am in London ($(TZ=Europe/London date)). Skipping."
            echo "run=no" >> "$GITHUB_OUTPUT"
          fi

  brief:
    needs: gate
    if: needs.gate.outputs.run == 'yes'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate the brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BRIEF_EMAIL_FROM: ${{ vars.BRIEF_EMAIL_FROM }}
          BRIEF_EMAIL_TO: ${{ vars.BRIEF_EMAIL_TO }}
        run: python main.py

      - name: Transcode audio to Alexa's spec (mono, 24 kHz, 48 kbps)
        run: |
          if [ -f output/brief_raw.mp3 ]; then
            ffmpeg -y -i output/brief_raw.mp3 -ac 1 -ar 24000 -b:a 48k \
                   -codec:a libmp3lame output/brief.mp3
            ls -la output/brief.mp3
          else
            echo "No audio produced (OPENAI_API_KEY not set?); skipping transcode."
          fi

      - name: Publish the feed, web page and audio (GitHub Pages serves docs/)
        run: |
          mkdir -p docs
          cp output/alexa_feed.json docs/alexa_feed.json
          cp output/index.html docs/index.html
          [ -f output/brief.mp3 ] && cp output/brief.mp3 docs/brief.mp3 || true

      - name: Commit the new brief
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --staged --quiet; then
            echo "No change in today's feed; nothing to commit."
          else
            git commit -m "Daily brief $(TZ=Europe/London date +%Y-%m-%d)"
            git push
          fi
