name: Daily Brief

on:
  schedule:
    # Fire several times in the morning (06-11 UTC = 07-12 BST / 06-11 GMT)
    # because GitHub Actions' cron is often delayed by 30+ minutes under load
    # — sometimes several hours. The gate job below dedupes by checking
    # whether today's brief has already been committed, so we still get
    # exactly ONE brief per weekday whenever GitHub actually fires.
    - cron: "0 6-11 * * 1-5"
  workflow_dispatch: {}   # also lets you run it on demand from the Actions tab

permissions:
  contents: write          # needed to commit the finished brief back to the repo

concurrency:
  group: daily-brief
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          TODAY=$(TZ=Europe/London date +%Y-%m-%d)
          DOW=$(TZ=Europe/London date +%u)
          echo "Now (London): $(TZ=Europe/London date), weekday=$DOW"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — running."
            echo "run=yes" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$DOW" -gt 5 ]; then
            echo "Weekend — skipping."
            echo "run=no" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git log --pretty=%s -50 | grep -qE "^Daily brief ${TODAY}\$"; then
            echo "Today's brief is already committed — skipping (dedupe)."
            echo "run=no" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Weekday and no brief yet today — running."
          echo "run=yes" >> "$GITHUB_OUTPUT"

  brief:
    needs: gate
    if: needs.gate.outputs.run == 'yes'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate the brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BRIEF_EMAIL_FROM: ${{ vars.BRIEF_EMAIL_FROM }}
          BRIEF_EMAIL_TO: ${{ vars.BRIEF_EMAIL_TO }}
        run: python main.py

      - name: Stitch + transcode audio to Alexa's spec (mono, 24 kHz, 48 kbps)
        run: |
          if [ -f output/segments.txt ]; then
            sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
            (cd output && ffmpeg -y -f concat -safe 0 -i segments.txt \
                 -ac 1 -ar 24000 -b:a 48k -codec:a libmp3lame brief.mp3)
            ls -la output/brief.mp3
          else
            echo "No audio segments (OPENAI_API_KEY not set?); skipping."
          fi

      - name: Publish the feed, web page and audio (GitHub Pages serves docs/)
        run: |
          mkdir -p docs
          cp output/alexa_feed.json docs/alexa_feed.json
          cp output/index.html docs/index.html
          [ -f output/brief.mp3 ] && cp output/brief.mp3 docs/brief.mp3 || true

      - name: Commit the new brief
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --staged --quiet; then
            echo "No change in today's feed; nothing to commit."
          else
            git commit -m "Daily brief $(TZ=Europe/London date +%Y-%m-%d)"
            git push
          fi
